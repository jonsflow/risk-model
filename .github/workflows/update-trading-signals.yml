name: Update trading signals (morning premarket)

on:
  schedule:
    # Weekdays at 13:00 UTC — 9:00 AM ET during EDT (summer), 8:00 AM ET during EST (winter)
    # Both times are before NYSE open (9:30 AM ET), suitable for premarket data capture
    - cron: "0 13 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-trading-signals
  cancel-in-progress: false

jobs:
  update-signals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install yfinance
        run: pip install yfinance

      - name: Pull latest changes before modifying data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git pull --rebase origin main

      - name: Fetch premarket hourly data
        run: python3 fetch_trading_hourly.py

      - name: Generate trading signals cache
        run: python3 generate_trading_cache.py

      - name: Commit and push updated data
        run: |
          HOURLY_FILES=$(python3 -c "
import json
c = json.load(open('trading_config.json'))
print(' '.join(f'data/{s[\"symbol\"].lower()}_hourly.csv' for s in c['symbols']))
")
          git add $HOURLY_FILES data/cache/trading_signals.json
          git diff --cached --quiet || git commit -m "Update trading signals (premarket)"
          git push
