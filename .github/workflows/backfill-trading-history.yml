name: Backfill Trading History

on:
  workflow_dispatch:
    inputs:
      days:
        description: 'Calendar days back to backfill'
        required: false
        default: '30'
      force:
        description: 'Regenerate existing cache files (true/false)'
        required: false
        default: 'false'

concurrency:
  group: backfill-trading
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance python-dotenv fredapi

      - name: Pull latest changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git pull --rebase origin main

      - name: Fetch latest daily data
        run: python3 scripts/fetch_data.py

      - name: Seed SQLite from existing CSVs
        run: python3 -m pipeline.run seed

      - name: Run backfill
        run: |
          ARGS="--days ${{ github.event.inputs.days }}"
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          python3 scripts/backfill_trading_history.py $ARGS

      - name: Commit backfilled cache files
        run: |
          git add data/cache/trading_signals_*.json
          git diff --cached --quiet || git commit -m "Backfill trading signals (${{ github.event.inputs.days }}d)"
          git push
