name: Generate analysis cache (data/cache/*.json)

on:
  workflow_run:
    workflows: ["Update market data (Yahoo Finance → data/*.csv)"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: generate-cache
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    # Only run if triggered manually, or if the data update succeeded
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Pull latest changes (includes freshly committed CSVs)
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git pull --rebase origin main

      - name: Generate analysis cache
        run: python3 generate_cache.py

      - name: Commit and push cache (if any)
        run: |
          git add data/cache/
          git diff --cached --quiet || git commit -m "Regenerate cache"
          git push
