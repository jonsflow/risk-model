<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Trend Structure</title>
  <base href="../">
  <link rel="stylesheet" href="styles/styles.css">
  <meta name="description" content="Multi-timeframe market structure for key assets — hourly, daily, and weekly HH/HL analysis." />
  <style>
    .tf-toggle {
      display: flex;
      gap: 8px;
    }
    .tf-btn {
      padding: 6px 16px;
      border-radius: 6px;
      border: 1px solid #374151;
      background: transparent;
      color: #9ca3af;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .tf-btn.active {
      background: #1e3a5f;
      border-color: #4a9eff;
      color: #e5e7eb;
    }
    .tf-btn:hover:not(.active) {
      border-color: #6b7280;
      color: #e5e7eb;
    }
    .trend-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      margin-top: 18px;
    }
    @media (max-width: 640px) {
      .trend-grid { grid-template-columns: 1fr; }
    }
    .trend-card {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 10px;
      padding: 14px 16px;
    }
    .trend-card-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 6px;
    }
    .trend-symbol {
      font-size: 15px;
      font-weight: 600;
      color: #e5e7eb;
    }
    .trend-asset-name {
      font-size: 11px;
      color: #6b7280;
    }
    .trend-label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .trend-label {
      font-size: 13px;
      font-weight: 600;
    }
    .trend-label.up       { color: #10b981; }
    .trend-label.down     { color: #ef4444; }
    .trend-label.sideways { color: #6b7280; }
    .trend-score {
      font-size: 12px;
      color: #6b7280;
    }
    .trend-sparkline {
      width: 100%;
      height: 70px;
      display: block;
    }
  </style>
</head>
<body>
  <nav class="site-nav"></nav>

  <!-- Header -->
  <div class="card">
    <div class="header-section">
      <div>
        <h1 style="margin:0 0 4px 0">Trend Structure</h1>
        <div class="muted" id="meta">Loading…</div>
      </div>
      <div class="tf-toggle">
        <button class="tf-btn" data-tf="hourly">Hourly</button>
        <button class="tf-btn active" data-tf="daily">Daily</button>
        <button class="tf-btn" data-tf="weekly">Weekly</button>
      </div>
    </div>
  </div>

  <!-- Overall score -->
  <div class="macro-score" style="margin-top:18px">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px">
      <div>
        <div class="macro-score-value" id="structure-score">Calculating…</div>
        <div class="macro-score-sub" id="structure-sub"></div>
      </div>
    </div>
  </div>

  <!-- Asset grid — populated by JS -->
  <div class="trend-grid" id="asset-grid"></div>

  <div class="card" style="margin-top:18px">
    <div class="muted" style="text-align:center;font-size:12px">
      Data provided by <a href="https://finance.yahoo.com" target="_blank" rel="noopener" style="color:#7aa2f7;text-decoration:none">Yahoo Finance</a> via <a href="https://github.com/ranaroussi/yfinance" target="_blank" rel="noopener" style="color:#7aa2f7;text-decoration:none">yfinance</a>
      · Hosted on <a href="https://pages.github.com" target="_blank" rel="noopener" style="color:#7aa2f7;text-decoration:none">GitHub Pages</a>
      · Hourly + daily data fetched via <a href="https://github.com/features/actions" target="_blank" rel="noopener" style="color:#7aa2f7;text-decoration:none">GitHub Actions</a>
      · Vibe-coded with <a href="https://claude.ai/code" target="_blank" rel="noopener" style="color:#7aa2f7;text-decoration:none">Claude Code</a>
      <br><span style="color:#6b7280;">Not financial advice — for research and informational purposes only.</span>
    </div>
  </div>

<script type="module" src="js/pages/trend_structure.js"></script>
</body>
</html>
